name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git openjdk-17-jdk unzip zip lld autoconf libtool cmake pkg-config zlib1g-dev libssl-dev libffi-dev
        pip install "cython<3.0.0" buildozer

    - name: Build APK with Buildozer
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,arabic_reshaper/g' buildozer.spec
        sed -i 's/#android.ndk = 25b/android.ndk = 25b/g' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        sed -i 's/android.archs = arm64-v8a, armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RepairCalcApp-APK
        path: bin/*.apk
        
