<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة صيانة الهواتف</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --input-bg: #0d1117;
            --border-color: #30363d;
            --accent-blue: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-purple: #a855f7;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 30px; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h1 { font-size: 1.4rem; color: var(--accent-blue); }
        .action-bar { display: flex; gap: 10px; margin-bottom: 14px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-add { background-color: var(--accent-green); color: #fff; }
        .btn-reset { background-color: var(--accent-red); color: #fff; }
        .btn-calc { background-color: #1d4ed8; color: #fff; width: 100%; padding: 12px; font-size: 1.05rem; margin: 10px 0 14px; }
        .repair-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .repair-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        .item-title { font-weight: bold; color: var(--accent-blue); font-size: 0.95rem; }
        .type-select { background-color: var(--input-bg); color: var(--accent-blue); border: 1px solid var(--border-color); padding: 6px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .btn-remove { background-color: var(--accent-red); color: white; border: none; width: 28px; height: 28px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 0.8rem; color: var(--text-muted); }
        .input-group input { background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 8px; color: #fff; font-size: 1rem; font-weight: bold; text-align: left; direction: ltr; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .res-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 10px; position: relative; overflow: hidden; }
        .res-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .res-dakhili::after { background-color: var(--accent-blue); }
        .res-khariji::after { background-color: var(--accent-purple); }
        .res-piec::after { background-color: var(--text-muted); }
        .res-amil::after { background-color: var(--accent-green); }
        .res-moulai::after { background-color: #2563eb; }
        .res-amil-piec::after { background-color: var(--accent-orange); }
        .res-info { display: flex; flex-direction: column; gap: 2px; }
        .res-title { font-size: 0.72rem; color: var(--text-muted); }
        .res-val { font-size: 1rem; font-weight: bold; color: #fff; direction: ltr; text-align: right; }
    </style>
</head>
<body>
    <div class="header"><h1>📱 حاسبة صيانة الهواتف</h1></div>
    <div class="action-bar">
        <button class="btn btn-add" onclick="addRepairItem()">➕ إضافة إصلاح</button>
        <button class="btn btn-reset" onclick="resetAll()">🗑️ مسح الكل</button>
    </div>
    <div id="repairList" class="repair-list"></div>
    <button class="btn btn-calc" onclick="calculateAll()">🧮 حساب الكل</button>
    <div class="summary-grid">
        <div class="res-card res-dakhili"><div class="res-info"><span class="res-title">مجموع البياس الداخلي</span><span class="res-val" id="resDakhili">0.00</span></div></div>
        <div class="res-card res-khariji"><div class="res-info"><span class="res-title">مجموع البياس الخارجي</span><span class="res-val" id="resKhariji">0.00</span></div></div>
        <div class="res-card res-piec"><div class="res-info"><span class="res-title">إجمالي قطع الغيار</span><span class="res-val" id="resTotalPiec">0.00</span></div></div>
        <div class="res-card res-amil"><div class="res-info"><span class="res-title">فائدة العامل الإجمالية</span><span class="res-val" id="resAmil">0.00</span></div></div>
        <div class="res-card res-moulai"><div class="res-info"><span class="res-title">فائدة مولاي الإجمالية</span><span class="res-val" id="resMoulai">0.00</span></div></div>
        <div class="res-card res-amil-piec"><div class="res-info"><span class="res-title">فائدة العامل والقطع</span><span class="res-val" id="resAmilPlusPiec">0.00</span></div></div>
    </div>
    <script>
        let itemCount = 0;
        function addRepairItem() {
            itemCount++;
            const list = document.getElementById('repairList');
            const card = document.createElement('div');
            card.className = 'repair-card'; card.id = `item-${itemCount}`;
            card.innerHTML = `
                <div class="card-header">
                    <button class="btn-remove" onclick="removeItem('item-${itemCount}')">✕</button>
                    <select class="type-select" onchange="onTypeChange(this, 'item-${itemCount}')">
                        <option value="ecran3">شاشة قسمة ثلاثة</option>
                        <option value="ecran2">شاشة قسمة اثنين</option>
                        <option value="akhar">إصلاح آخر</option>
                        <option value="khsara2">خسارة قسمة اثنين</option>
                        <option value="khsara3">خسارة قسمة ثلاثة</option>
                    </select>
                    <span class="item-title">إصلاح رقم #${itemCount}</span>
                </div>
                <div class="input-grid" id="grid-item-${itemCount}">
                    <div class="input-group"><label>سعر الزبون</label><input type="number" class="inp-price" placeholder="0" oninput="calculateAll()"></div>
                    <div class="input-group"><label>سعر بياس داخلي</label><input type="number" class="inp-dakhili" placeholder="0" oninput="calculateAll()"></div>
                    <div class="input-group"><label>سعر بياس خارجي</label><input type="number" class="inp-khariji" placeholder="0" oninput="calculateAll()"></div>
                </div>`;
            list.appendChild(card); calculateAll();
        }
        function removeItem(id) {
            const list = document.getElementById('repairList');
            if (list.children.length > 1) { document.getElementById(id).remove(); }
            else { document.querySelectorAll(`#${id} input`).forEach(i => i.value = ''); }
            calculateAll();
        }
        function onTypeChange(selectEl, itemId) {
            const grid = document.getElementById(`grid-${itemId}`);
            if (selectEl.value.includes('khsara')) {
                grid.innerHTML = `<div class="input-group" style="grid-column: span 2;"><label style="color:var(--accent-red)">مبلغ الخسارة</label><input type="number" class="inp-loss" placeholder="0" oninput="calculateAll()"></div>`;
            } else {
                grid.innerHTML = `
                    <div class="input-group"><label>سعر الزبون</label><input type="number" class="inp-price" placeholder="0" oninput="calculateAll()"></div>
                    <div class="input-group"><label>سعر بياس داخلي</label><input type="number" class="inp-dakhili" placeholder="0" oninput="calculateAll()"></div>
                    <div class="input-group"><label>سعر بياس خارجي</label><input type="number" class="inp-khariji" placeholder="0" oninput="calculateAll()"></div>`;
            }
            calculateAll();
        }
        function resetAll() { document.getElementById('repairList').innerHTML = ''; itemCount = 0; addRepairItem(); }
        function calculateAll() {
            let totalD = 0, totalK = 0, totalM = 0, totalA = 0;
            document.querySelectorAll('.repair-card').forEach(card => {
                const type = card.querySelector('.type-select').value;
                if (type.includes('khsara')) {
                    const loss = parseFloat(card.querySelector('.inp-loss')?.value || 0);
                    const faida = -loss;
                    if (type === 'khsara3') { totalM += (faida * 2) / 3; totalA += faida / 3; }
                    else { totalM += faida / 2; totalA += faida / 2; }
                } else {
                    const price = parseFloat(card.querySelector('.inp-price')?.value || 0);
                    const d = parseFloat(card.querySelector('.inp-dakhili')?.value || 0);
                    const k = parseFloat(card.querySelector('.inp-khariji')?.value || 0);
                    const faida = price - (d + k);
                    totalD += d; totalK += k;
                    if (type === 'ecran3') { totalM += (faida * 2) / 3; totalA += faida / 3; }
                    else { totalM += faida / 2; totalA += faida / 2; }
                }
            });
            const totalP = totalD + totalK;
            const fmt = n => n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('resDakhili').textContent = fmt(totalD);
            document.getElementById('resKhariji').textContent = fmt(totalK);
            document.getElementById('resTotalPiec').textContent = fmt(totalP);
            document.getElementById('resAmil').textContent = fmt(totalA);
            document.getElementById('resMoulai').textContent = fmt(totalM);
            document.getElementById('resAmilPlusPiec').textContent = fmt(totalA + totalP);
        }
        window.onload = addRepairItem;
    </script>
</body>
</html>
