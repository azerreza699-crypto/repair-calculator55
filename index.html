<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة صيانة الهواتف</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 12px;
            direction: rtl;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 30px;
        }

        .header {
            text-align: center;
            font-size: 1.2rem;
            color: #38bdf8;
            margin-bottom: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .badge {
            background-color: #1e293b;
            border: 1px dashed #38bdf8;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .btn-link {
            background: none;
            border: none;
            color: #f43f5e;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.8rem;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
        }

        .btn:active { opacity: 0.8; }
        .btn-add { background-color: #10b981; color: #ffffff; }
        .btn-reset { background-color: #f43f5e; color: #ffffff; }
        .btn-main { width: 100%; background-color: #2563eb; color: #ffffff; font-size: 1rem; margin-bottom: 12px; }
        .btn-excel { width: 100%; background-color: #16a34a; color: #ffffff; font-size: 0.9rem; }

        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
            gap: 8px;
        }

        .card-title {
            color: #38bdf8;
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .select-type {
            background-color: #0f172a;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            padding: 6px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            flex: 1;
            outline: none;
        }

        .btn-del {
            background-color: rgba(244, 63, 94, 0.2);
            color: #f43f5e;
            border: 1px solid #f43f5e;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field label {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .field input {
            width: 100%;
            height: 44px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0 10px;
            direction: ltr;
            text-align: left;
            outline: none;
        }

        .field input:focus {
            border-color: #38bdf8;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .res-box {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .res-label {
            font-size: 0.72rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 2px;
        }

        .res-value {
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
            direction: ltr;
            text-align: right;
            display: block;
        }

        .icon-svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg class="icon-svg" style="width: 22px; height: 22px;" viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
        <span>حاسبة صيانة الهواتف</span>
    </div>

    <div class="badge">
        <span>الأرشيف المحفوظ: <strong id="archCount">0</strong> عملية</span>
        <button class="btn-link" id="btnClearArch">مسح الأرشيف</button>
    </div>

    <div class="btn-row">
        <button class="btn btn-add" id="btnAddCard">➕ إضافة إصلاح</button>
        <button class="btn btn-reset" id="btnResetCurrent">🗑️ مسح الحاضر</button>
    </div>

    <div id="cardsContainer"></div>

    <button class="btn btn-main" id="btnSaveArch">🧮 حساب وحفظ في الأرشيف تلقائياً</button>

    <div class="results-grid">
        <div class="res-box">
            <span class="res-label">مجموع بياس داخلي</span>
            <span class="res-value" id="rDakhili">0.00</span>
        </div>
        <div class="res-box">
            <span class="res-label">مجموع بياس خارجي</span>
            <span class="res-value" id="rKhariji">0.00</span>
        </div>
        <div class="res-box">
            <span class="res-label">إجمالي قطع الغيار</span>
            <span class="res-value" id="rTotalPiec">0.00</span>
        </div>
        <div class="res-box">
            <span class="res-label">فائدة العامل الإجمالية</span>
            <span class="res-value" id="rAmil">0.00</span>
        </div>
        <div class="res-box">
            <span class="res-label">فائدة مولاي الإجمالية</span>
            <span class="res-value" id="rMoulai">0.00</span>
        </div>
        <div class="res-box">
            <span class="res-label">فائدة العامل والقطع</span>
            <span class="res-value" id="rAmilPiec">0.00</span>
        </div>
    </div>

    <button class="btn btn-excel" id="btnExportCSV">📊 تنزيل ملف إكسل CSV شامل</button>

    <script>
        let cardCounter = 0;
        let archive = [];

        function parseNum(val) {
            if (!val) return 0;
            let str = val.toString();
            str = str.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
            str = str.replace(',', '.');
            const num = parseFloat(str);
            return isNaN(num) ? 0 : num;
        }

        function loadArchive() {
            try {
                const data = localStorage.getItem('repair_archive_v3');
                if (data) archive = JSON.parse(data);
            } catch (e) { archive = []; }
            document.getElementById('archCount').innerText = archive.length;
        }

        function saveArchive() {
            try {
                localStorage.setItem('repair_archive_v3', JSON.stringify(archive));
            } catch (e) {}
            document.getElementById('archCount').innerText = archive.length;
        }

        function clearArchive() {
            if (confirm("هل أنت تأكد من مسح جميع العمليات المحفوظة في الأرشيف؟")) {
                archive = [];
                saveArchive();
                calculateTotals();
            }
        }

        function addCard() {
            cardCounter++;
            const container = document.getElementById('cardsContainer');
            const card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = `
                <div class="card-header">
                    <button class="btn-del" type="button">✕</button>
                    <select class="select-type">
                        <option value="ecran3">شاشة قسمة ثلاثة</option>
                        <option value="ecran2">شاشة قسمة اثنين</option>
                        <option value="akhar">إصلاح آخر</option>
                        <option value="khsara2">خسارة قسمة اثنين</option>
                        <option value="khsara3">خسارة قسمة ثلاثة</option>
                    </select>
                    <span class="card-title">إصلاح #${cardCounter}</span>
                </div>
                <div class="field-group">
                    <div class="field">
                        <label>سعر الزبون</label>
                        <input type="text" inputmode="decimal" class="inp-price" placeholder="0">
                    </div>
                    <div class="field">
                        <label>بياس داخلي</label>
                        <input type="text" inputmode="decimal" class="inp-dakhili" placeholder="0">
                    </div>
                    <div class="field">
                        <label>بياس خارجي</label>
                        <input type="text" inputmode="decimal" class="inp-khariji" placeholder="0">
                    </div>
                </div>
            `;
            container.appendChild(card);
            calculateTotals();
        }

        function deleteCard(btn) {
            const card = btn.closest('.card');
            const container = document.getElementById('cardsContainer');
            if (container.children.length > 1) {
                card.remove();
            } else {
                card.querySelectorAll('input').forEach(input => input.value = '');
            }
            calculateTotals();
        }

        function handleTypeChange(select) {
            const card = select.closest('.card');
            const fg = card.querySelector('.field-group');
            const type = select.value;
            const isLoss = type.includes('khsara');
            const wasLoss = fg.querySelector('.inp-loss') !== null;

            const pVal = fg.querySelector('.inp-price')?.value || '';
            const dVal = fg.querySelector('.inp-dakhili')?.value || '';
            const kVal = fg.querySelector('.inp-khariji')?.value || '';
            const lVal = fg.querySelector('.inp-loss')?.value || '';

            if (isLoss && !wasLoss) {
                fg.innerHTML = `
                    <div class="field">
                        <label style="color:#f43f5e;">مبلغ الخسارة</label>
                        <input type="text" inputmode="decimal" class="inp-loss" placeholder="0" value="${pVal || lVal}">
                    </div>
                `;
            } else if (!isLoss && wasLoss) {
                fg.innerHTML = `
                    <div class="field">
                        <label>سعر الزبون</label>
                        <input type="text" inputmode="decimal" class="inp-price" placeholder="0" value="${lVal || pVal}">
                    </div>
                    <div class="field">
                        <label>بياس داخلي</label>
                        <input type="text" inputmode="decimal" class="inp-dakhili" placeholder="0" value="${dVal}">
                    </div>
                    <div class="field">
                        <label>بياس خارجي</label>
                        <input type="text" inputmode="decimal" class="inp-khariji" placeholder="0" value="${kVal}">
                    </div>
                `;
            }
        }

        function resetCurrent() {
            document.getElementById('cardsContainer').innerHTML = '';
            cardCounter = 0;
            addCard();
        }

        function calculateTotals() {
            let totalD = 0, totalK = 0, totalM = 0, totalA = 0;

            archive.forEach(item => {
                if (item.type.includes('khsara')) {
                    const faida = -item.loss;
                    if (item.type === 'khsara3') {
                        totalM += (faida * 2) / 3;
                        totalA += faida / 3;
                    } else {
                        totalM += faida / 2;
                        totalA += faida / 2;
                    }
                } else {
                    const faida = item.price - (item.dakhili + item.khariji);
                    totalD += item.dakhili;
                    totalK += item.khariji;

                    if (item.type === 'ecran3') {
                        totalM += (faida * 2) / 3;
                        totalA += faida / 3;
                    } else {
                        totalM += faida / 2;
                        totalA += faida / 2;
                    }
                }
            });

            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const select = card.querySelector('.select-type');
                if (!select) return;
                const type = select.value;

                if (type.includes('khsara')) {
                    const loss = parseNum(card.querySelector('.inp-loss')?.value);
                    const faida = -loss;
                    if (type === 'khsara3') {
                        totalM += (faida * 2) / 3;
                        totalA += faida / 3;
                    } else {
                        totalM += faida / 2;
                        totalA += faida / 2;
                    }
                } else {
                    const price = parseNum(card.querySelector('.inp-price')?.value);
                    const dakhili = parseNum(card.querySelector('.inp-dakhili')?.value);
                    const khariji = parseNum(card.querySelector('.inp-khariji')?.value);

                    totalD += dakhili;
                    totalK += khariji;

                    const faida = price - (dakhili + khariji);
                    if (type === 'ecran3') {
                        totalM += (faida * 2) / 3;
                        totalA += faida / 3;
                    } else {
                        totalM += faida / 2;
                        totalA += faida / 2;
                    }
                }
            });

            const totalP = totalD + totalK;
            const fmt = n => n.toFixed(2);

            document.getElementById('rDakhili').innerText = fmt(totalD);
            document.getElementById('rKhariji').innerText = fmt(totalK);
            document.getElementById('rTotalPiec').innerText = fmt(totalP);
            document.getElementById('rAmil').innerText = fmt(totalA);
            document.getElementById('rMoulai').innerText = fmt(totalM);
            document.getElementById('rAmilPiec').innerText = fmt(totalA + totalP);
        }

        function calculateAndSave() {
            const cards = document.querySelectorAll('.card');
            let addedCount = 0;

            cards.forEach(card => {
                const select = card.querySelector('.select-type');
                if (!select) return;
                const type = select.value;
                const typeText = select.options[select.selectedIndex].text;

                if (type.includes('khsara')) {
                    const loss = parseNum(card.querySelector('.inp-loss')?.value);
                    if (loss > 0) {
                        archive.push({ type, typeText, price: 0, dakhili: 0, khariji: 0, loss, date: new Date().toLocaleDateString('ar-EG') });
                        addedCount++;
                    }
                } else {
                    const price = parseNum(card.querySelector('.inp-price')?.value);
                    const dakhili = parseNum(card.querySelector('.inp-dakhili')?.value);
                    const khariji = parseNum(card.querySelector('.inp-khariji')?.value);
                    if (price > 0 || dakhili > 0 || khariji > 0) {
                        archive.push({ type, typeText, price, dakhili, khariji, loss: 0, date: new Date().toLocaleDateString('ar-EG') });
                        addedCount++;
                    }
                }
            });

            if (addedCount === 0) {
                alert("يرجى إدخال مبالغ العمليات أولاً!");
                return;
            }

            saveArchive();
            resetCurrent();
            calculateTotals();
            alert("تم حفظ العمليات في الأرشيف بنجاح! 🚀");
        }

        function exportCSV() {
            if (archive.length === 0 && document.querySelectorAll('.card').length === 0) {
                alert("لا توجد بيانات للتصدير!");
                return;
            }

            let csv = "\uFEFFالتاريخ,نوع الإصلاح,سعر الزبون,بياس داخلي,بياس خارجي,الخسارة\n";

            archive.forEach(item => {
                csv += `"${item.date}","${item.typeText}",${item.price},${item.dakhili},${item.khariji},${item.loss}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `تقرير_الصيانة_${new Date().toLocaleDateString('ar-EG')}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadArchive();
            addCard();

            document.addEventListener('input', function(e) {
                if (e.target.tagName === 'INPUT') calculateTotals();
            });

            document.addEventListener('change', function(e) {
                if (e.target.classList.contains('select-type')) {
                    handleTypeChange(e.target);
                    calculateTotals();
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.id === 'btnAddCard') addCard();
                else if (e.target.id === 'btnResetCurrent') resetCurrent();
                else if (e.target.id === 'btnSaveArch') calculateAndSave();
                else if (e.target.id === 'btnClearArch') clearArchive();
                else if (e.target.id === 'btnExportCSV') exportCSV();
                else if (e.target.classList.contains('btn-del')) deleteCard(e.target);
            });
        });
    </script>
</body>
</html>
